<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz Simple v1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 10 Simple Math Questions Built-In
        const QUESTIONS = [
            { id: 1, q: "5 + 7", options: [10, 11, 12, 13], a: 12 },
            { id: 2, q: "12 - 4", options: [6, 8, 9, 10], a: 8 },
            { id: 3, q: "3 × 4", options: [10, 12, 14, 16], a: 12 },
            { id: 4, q: "20 ÷ 5", options: [2, 4, 5, 6], a: 4 },
            { id: 5, q: "15 + 10", options: [20, 25, 30, 35], a: 25 },
            { id: 6, q: "9 × 2", options: [16, 18, 20, 22], a: 18 },
            { id: 7, q: "50 - 25", options: [20, 25, 30, 35], a: 25 },
            { id: 8, q: "6 × 6", options: [30, 32, 36, 40], a: 36 },
            { id: 9, q: "100 ÷ 4", options: [20, 25, 30, 50], a: 25 },
            { id: 10, q: "13 + 8", options: [20, 21, 22, 23], a: 21 }
        ];

        function App() {
            const [studentName, setStudentName] = useState("");
            const [step, setStep] = useState('name'); // name, quiz, finished
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);

            const startQuiz = () => {
                if (studentName.trim().length < 2) return;
                setStep('quiz');
            };

            const handleAnswer = (option) => {
                if (selectedOption !== null) return;
                setSelectedOption(option);
                
                if (option === QUESTIONS[currentIdx].a) {
                    setScore(s => s + 1);
                }

                setTimeout(() => {
                    if (currentIdx < QUESTIONS.length - 1) {
                        setCurrentIdx(prev => prev + 1);
                        setSelectedOption(null);
                    } else {
                        setStep('finished');
                    }
                }, 600);
            };

            if (step === 'name') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl shadow-slate-200 max-w-md w-full text-center">
                            <h1 className="text-3xl font-black text-slate-800 mb-2">Math Quiz v1</h1>
                            <p className="text-slate-400 mb-8">Enter your name to start</p>
                            <input 
                                type="text" 
                                value={studentName}
                                onChange={(e) => setStudentName(e.target.value)}
                                className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-6 text-center text-xl outline-none transition-all"
                                placeholder="Name"
                            />
                            <button onClick={startQuiz} className="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-lg shadow-blue-200">Start</button>
                        </div>
                    </div>
                );
            }

            if (step === 'finished') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6 text-center">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl max-w-md w-full">
                            <h1 className="text-4xl font-black mb-2 text-blue-600">Great Job!</h1>
                            <p className="text-slate-500 mb-6">{studentName}, you finished the quiz.</p>
                            <div className="text-6xl font-black text-slate-800 mb-8">
                                {score} <span className="text-2xl text-slate-300">/ {QUESTIONS.length}</span>
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full bg-slate-800 text-white font-bold py-5 rounded-2xl">Try Again</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl shadow-blue-100 max-w-xl w-full">
                        <div className="flex justify-between items-center mb-10">
                            <span className="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-xs font-extrabold uppercase">{studentName}</span>
                            <span className="text-slate-300 font-black text-xl">{currentIdx + 1} / {QUESTIONS.length}</span>
                        </div>
                        <h2 className="text-8xl font-black text-slate-800 mb-12 text-center tracking-tighter">{QUESTIONS[currentIdx].q}</h2>
                        <div className="grid grid-cols-2 gap-4">
                            {QUESTIONS[currentIdx].options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(opt)} className={`py-6 rounded-3xl border-2 font-bold text-3xl transition-all ${
                                    selectedOption === null ? "border-slate-100 hover:border-blue-200 hover:bg-blue-50" : 
                                    opt === QUESTIONS[currentIdx].a ? "bg-green-500 border-green-500 text-white shadow-lg shadow-green-200" : 
                                    opt === selectedOption ? "bg-red-500 border-red-500 text-white" : "opacity-20 border-transparent"
                                }`}>{opt}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
