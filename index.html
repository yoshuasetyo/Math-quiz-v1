<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz Simple v1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .math-text { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MASTER_QUESTIONS = [
            { id: 1, q: "If a train travels 60 miles in 1.5 hours, what is its average speed in miles per hour?", options: ["30 mph", "40 mph", "45 mph", "50 mph"], a: "40 mph" },
            { id: 2, q: "Solve for x: 2x + 15 = 31", options: ["x = 6", "x = 8", "x = 9", "x = 10"], a: "x = 8" },
            { id: 3, q: "A rectangular garden has a length of 12m and a width of 5m. What is the total perimeter?", options: ["17m", "34m", "60m", "72m"], a: "34m" },
            { id: 4, q: "What is 15% of 200?", options: ["20", "25", "30", "35"], a: "30" },
            { id: 5, q: "Simplify the expression: 3(x + 4) - 2x", options: ["x + 12", "5x + 12", "x + 4", "x - 12"], a: "x + 12" },
            { id: 6, q: "If y = 3x - 5, what is the value of y when x = 4?", options: ["2", "7", "12", "17"], a: "7" },
            { id: 7, q: "The sum of three consecutive integers is 45. What is the smallest integer?", options: ["13", "14", "15", "16"], a: "14" },
            { id: 8, q: "Calculate the area of a triangle with a base of 10cm and a height of 6cm.", options: ["15 cm²", "30 cm²", "60 cm²", "16 cm²"], a: "30 cm²" },
            { id: 9, q: "Which of the following is a prime number?", options: ["9", "15", "21", "23"], a: "23" },
            { id: 10, q: "A pair of shoes is on sale for 20% off. If the original price was $80, what is the sale price?", options: ["$60", "$64", "$68", "$72"], a: "$64" }
        ];

        const shuffle = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        function App() {
            const [studentName, setStudentName] = useState("");
            const [step, setStep] = useState('name'); 
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);

            // ==========================================
            // START OF DEV SKIP (REMOVE THIS BLOCK LATER)
            // ==========================================
            useEffect(() => {
                const skipNaming = true; // Set to false to see the name screen again
                if (skipNaming) {
                    setStudentName("Developer");
                    const fixedQuestionsWithShuffledOptions = MASTER_QUESTIONS.map(q => ({
                        ...q,
                        options: shuffle(q.options)
                    }));
                    setQuestions(fixedQuestionsWithShuffledOptions);
                    setStep('quiz');
                }
            }, []);
            // ==========================================
            // END OF DEV SKIP
            // ==========================================

            const startQuiz = () => {
                if (studentName.trim().length < 2) return;
                const fixedQuestionsWithShuffledOptions = MASTER_QUESTIONS.map(q => ({
                    ...q,
                    options: shuffle(q.options)
                }));
                setQuestions(fixedQuestionsWithShuffledOptions);
                setStep('quiz');
            };

            const handleAnswer = (option) => {
                const currentQuestion = questions[currentIdx];
                setAnswers(prev => ({ ...prev, [currentQuestion.id]: option }));
                
                if (currentIdx < questions.length - 1) {
                    setTimeout(() => setCurrentIdx(prev => prev + 1), 300);
                }
            };

            const handleSubmit = () => {
                setIsSubmitting(true);
                setTimeout(() => {
                    setIsSubmitting(false);
                    setSubmitted(true);
                }, 1500);
            };

            if (step === 'name') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6 bg-slate-50">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl max-w-md w-full text-center">
                            <h1 className="text-3xl font-black text-slate-800 mb-6 tracking-tight">Math Quiz v1</h1>
                            <input 
                                type="text" 
                                value={studentName}
                                onChange={(e) => setStudentName(e.target.value)}
                                className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-6 text-center text-xl outline-none transition-all"
                                placeholder="Enter Your Name"
                            />
                            <button onClick={startQuiz} disabled={studentName.length < 2} className="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 disabled:opacity-50">Start Quiz</button>
                        </div>
                    </div>
                );
            }

            if (step === 'finished') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6 text-center">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl max-w-md w-full">
                            {!submitted ? (
                                <>
                                    <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">📝</div>
                                    <h1 className="text-3xl font-black mb-2 text-slate-800">Quiz Complete</h1>
                                    <p className="text-slate-500 mb-8 px-4">Ready to turn in your work? You can't go back once you submit.</p>
                                    <button onClick={handleSubmit} disabled={isSubmitting} className="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-lg disabled:opacity-70 flex items-center justify-center gap-3">
                                        {isSubmitting ? "Submitting..." : "Submit to Teacher"}
                                    </button>
                                </>
                            ) : (
                                <div className="py-6">
                                    <div className="w-20 h-20 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl animate-bounce">✅</div>
                                    <h1 className="text-3xl font-black mb-2 text-slate-800">Done!</h1>
                                    <p className="text-slate-500 px-6">Your answers have been securely recorded. You may now close this browser tab.</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const currentQuestion = questions[currentIdx];

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-50">
                    <div className="bg-white p-6 md:p-10 rounded-[2rem] shadow-xl max-w-lg w-full">
                        
                        {/* Navigation Header */}
                        <div className="flex justify-between items-center mb-8 border-b border-slate-50 pb-4">
                            <button 
                                onClick={() => currentIdx > 0 && setCurrentIdx(c => c - 1)}
                                className={`p-2 rounded-full transition-all ${currentIdx === 0 ? 'opacity-0 pointer-events-none' : 'text-slate-400 hover:bg-slate-50'}`}
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <div className="text-center">
                                <div className="text-[10px] font-extrabold text-blue-500 uppercase tracking-widest">{studentName}</div>
                                <div className="text-slate-800 font-bold text-sm">Question {currentIdx + 1} of {questions.length}</div>
                            </div>
                            <button 
                                onClick={() => currentIdx < questions.length - 1 ? setCurrentIdx(c => c + 1) : setStep('finished')}
                                className="p-2 rounded-full text-slate-400 hover:bg-slate-50 transition-all"
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </div>

                        {/* Word Problem Area - Smaller, more readable text */}
                        <div className="mb-10 min-h-[100px] flex items-center justify-center text-center">
                            <h2 className="text-xl md:text-2xl font-semibold text-slate-700 leading-relaxed px-2">
                                {currentQuestion.q}
                            </h2>
                        </div>

                        {/* Vertical Options Layout */}
                        <div className="flex flex-col gap-3">
                            {currentQuestion.options.map((opt, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => handleAnswer(opt)} 
                                    className={`w-full py-4 px-6 rounded-2xl border-2 text-left font-medium text-lg transition-all duration-200 ${
                                        answers[currentQuestion.id] === undefined 
                                            ? "border-slate-100 hover:border-blue-400 hover:bg-blue-50" 
                                            : opt === answers[currentQuestion.id]
                                                ? "bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-100 translate-x-1" 
                                                : "border-slate-50 text-slate-300"
                                    }`}
                                >
                                    <div className="flex items-center gap-4">
                                        <span className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold ${opt === answers[currentQuestion.id] ? 'bg-white/20' : 'bg-slate-100 text-slate-400'}`}>
                                            {String.fromCharCode(65 + i)}
                                        </span>
                                        {opt}
                                    </div>
                                </button>
                            ))}
                        </div>

                        {/* Bottom Submit Shortcut */}
                        {currentIdx === questions.length - 1 && (
                            <button 
                                onClick={() => setStep('finished')}
                                className="mt-8 w-full bg-slate-800 text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform"
                            >
                                Finished? Go to Submit
                            </button>
                        )}
                    </div>
                    
                    {/* Navigation Dots below card */}
                    <div className="mt-8 flex gap-2">
                        {questions.map((q, idx) => (
                            <button
                                key={q.id}
                                onClick={() => setCurrentIdx(idx)}
                                className={`h-1.5 rounded-full transition-all ${
                                    idx === currentIdx ? 'bg-blue-600 w-8' : 
                                    answers[q.id] !== undefined ? 'bg-blue-200 w-4' : 'bg-slate-200 w-4'
                                }`}
                            />
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
